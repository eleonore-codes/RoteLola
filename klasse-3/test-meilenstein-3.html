<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meilenstein-Test 3</title>
    <link rel="apple-touch-icon" href="../apple-touch-icon.png">
    <style>
        * { box-sizing: border-box; }
        html, body { min-height: 100%; }
        body {
            margin: 0;
            background: #081827;
            color: #ffffff;
            font-family: Arial, Verdana, sans-serif;
            letter-spacing: 0.06em;
            user-select: none;
            -webkit-user-select: none;
        }
        .arena {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 12px;
            background:
                radial-gradient(circle at 50% 0%, rgba(0, 242, 254, 0.16), rgba(8, 24, 39, 0) 34%),
                linear-gradient(180deg, #102b45 0%, #081827 62%);
        }
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            max-width: 520px;
            width: 100%;
            margin: 0 auto 10px auto;
        }
        .nav-back {
            min-width: 76px;
            min-height: 42px;
            border: 1px solid #89b8d9;
            background: rgba(8, 24, 39, 0.7);
            color: #d8f6ff;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
        }
        .title {
            flex: 1;
            min-width: 0;
            text-align: center;
            color: #00f2fe;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .score {
            min-width: 76px;
            text-align: right;
            color: #ffffff;
            font-weight: bold;
            font-size: 15px;
        }
        .progress-track {
            max-width: 520px;
            width: 100%;
            height: 12px;
            border-radius: 999px;
            overflow: hidden;
            margin: 0 auto 12px auto;
            background: #34526d;
            border: 1px solid rgba(255,255,255,0.16);
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00f2fe, #d7ff4f);
        }
        .card {
            max-width: 520px;
            width: 100%;
            margin: 0 auto;
            border: 2px solid #00f2fe;
            background: rgba(13, 37, 59, 0.94);
            border-radius: 8px;
            padding: 14px;
            min-height: 460px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 0 18px rgba(0, 242, 254, 0.25);
        }
        .mode-card {
            display: flex;
            align-items: center;
            gap: 12px;
            border-radius: 8px;
            padding: 10px;
            background: #102f49;
            border: 2px solid #d7ff4f;
            min-height: 74px;
        }
        .mode-symbol {
            width: 76px;
            min-width: 76px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            background: #d7ff4f;
            color: #081827;
            font-size: 25px;
            font-weight: bold;
            letter-spacing: 0;
            text-align: center;
        }
        .mode {
            min-width: 0;
            color: #ffffff;
            font-weight: bold;
            font-size: 20px;
            line-height: 1.15;
            letter-spacing: 0.03em;
        }
        .instruction {
            margin-top: 12px;
            color: #ffffff;
            font-size: 22px;
            line-height: 1.25;
            min-height: 58px;
            font-weight: bold;
        }
        .word-box {
            margin: 12px 0;
            min-height: 102px;
            border: 2px dashed #00f2fe;
            border-radius: 8px;
            background: #081827;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 14px;
            font-size: 34px;
            font-weight: bold;
            line-height: 1.22;
            overflow-wrap: anywhere;
        }
        .hint {
            color: #d7ff4f;
            min-height: 26px;
            font-size: 16px;
            line-height: 1.35;
            font-weight: bold;
            text-align: center;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 12px;
        }
        .option-btn, .wide-btn {
            width: 100%;
            max-width: 100%;
            min-width: 0;
            min-height: 62px;
            border: 2px solid #00f2fe;
            border-radius: 8px;
            background: #1d4466;
            color: #ffffff;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 0.04em;
            padding: 12px;
            overflow-wrap: anywhere;
            -webkit-tap-highlight-color: transparent;
        }
        .option-btn:active, .wide-btn:active {
            transform: scale(0.98);
            background: #00f2fe;
            color: #081827;
        }
        .feedback {
            min-height: 62px;
            margin-top: 12px;
            padding: 10px;
            border-radius: 8px;
            font-size: 16px;
            line-height: 1.35;
            text-align: center;
            font-weight: bold;
            background: rgba(8, 24, 39, 0.7);
        }
        .good { color: #9cff7c; border: 1px solid rgba(156,255,124,0.5); }
        .bad { color: #ffb1b1; border: 1px solid rgba(255,177,177,0.5); }
        .hidden { display: none; }
        .syllable { color: #00f2fe; }
        .abc-theme { border-color: #d7ff4f; }
        .abc-theme .mode-symbol { background: #d7ff4f; }
        .book-theme { border-color: #00f2fe; }
        .book-theme .mode-symbol { background: #00f2fe; }
        .foreign-theme { border-color: #ffcc66; }
        .foreign-theme .mode-symbol { background: #ffcc66; }
        .detective-theme { border-color: #ff8fb1; }
        .detective-theme .mode-symbol { background: #ff8fb1; }
        .vowel-theme { border-color: #00f2fe; }
        .vowel-theme .mode-symbol { background: #00f2fe; }
        .rhyme-theme { border-color: #d7ff4f; }
        .rhyme-theme .mode-symbol { background: #d7ff4f; }
        .longi-theme { border-color: #ffcc66; }
        .longi-theme .mode-symbol { background: #ffcc66; }
        .syllable-theme { border-color: #b9a7ff; }
        .syllable-theme .mode-symbol { background: #b9a7ff; }
        .report-title {
            color: #00f2fe;
            font-size: 24px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .report-box {
            border: 2px dashed #00f2fe;
            border-radius: 8px;
            background: #081827;
            padding: 12px;
            font-size: 18px;
            line-height: 1.45;
        }
        .grade-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 86px;
            min-height: 62px;
            margin-top: 8px;
            border-radius: 8px;
            background: #d7ff4f;
            color: #081827;
            font-size: 34px;
            font-weight: bold;
            letter-spacing: 0;
        }
        .review-btn {
            margin-top: 10px;
            border-color: #d7ff4f;
            background: #244b31;
        }
        @media (max-width: 380px) {
            .word-box { font-size: 29px; }
            .option-btn, .wide-btn { font-size: 19px; min-height: 58px; }
            .title { font-size: 16px; }
            .mode { font-size: 18px; }
            .instruction { font-size: 20px; }
            .mode-symbol { width: 66px; min-width: 66px; font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="arena">
        <div class="topbar">
            <button class="nav-back" id="back-btn" type="button">Men&uuml;</button>
            <div class="title">Meilenstein-Test 3</div>
            <div class="score"><span id="score-val">0</span> / <span id="rounds-val">8</span></div>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>

        <div class="card" id="test-card">
            <div id="play-area">
                <div class="mode-card" id="mode-card">
                    <div class="mode-symbol" id="mode-symbol">?</div>
                    <div class="mode" id="mode-label">Test wird geladen</div>
                </div>
                <div class="instruction" id="instruction-text">Gleich geht es los.</div>
                <div class="word-box" id="word-box">...</div>
                <div class="hint" id="hint-box"></div>
            </div>
            <div id="control-area">
                <div class="options" id="options-box"></div>
                <div class="feedback" id="feedback-box"></div>
                <button class="wide-btn hidden" id="next-btn" type="button">Weiter</button>
            </div>
        </div>
    </div>

    <script>

            },
            {

                instruction: "Suche die Grundform.",

            },
            {

                instruction: "Was bedeutet das?",

            },
            {

                mode: "Kapitel 5: Grundform",
                instruction: "Suche die Grundform.",
                word: "er a&szlig;",

                mode: "Kapitel 5: Wortbau",
                instruction: "Baue das Wort richtig.",
                word: "Klassen + Olympiade",

                reveal: "Klassenolympiade",
                hint: "Zusammengesetzte W&ouml;rter bestehen aus sicheren Bausteinen."
            }

        var chapter6Tasks = [
            {
                chapter: 6,
                cue: "ee",
                theme: "vowel-theme",
                mode: "Kapitel 6: Doppelvokal",
                instruction: "Welcher Vokal passt?",

            },
            {
                chapter: 6,
                cue: "oo",
                theme: "vowel-theme",
                mode: "Kapitel 6: Doppelvokal",
                instruction: "Was geh&ouml;rt zu oo?",
                word: "oo",
                options: ["Moor", "Meer", "minus"],
                answer: "Moor",
                reveal: "Moor",
                hint: "Boot, Zoo und Moor passen zusammen."
            },
            {
                chapter: 6,
                cue: "=",
                theme: "rhyme-theme",
                mode: "Kapitel 6: Reim",
                instruction: "Welches Wort reimt sich?",
                word: "Haar",
                options: ["Paar", "Meer", "Zoo"],
                answer: "Paar",
                reveal: "Haar - Paar",
                hint: "Reime helfen beim H&ouml;ren und Merken."
            },
            {
                chapter: 6,
                cue: "i",
                theme: "longi-theme",
                mode: "Kapitel 6: langes i",
                instruction: "Wo klingt das i lang?",
                word: "Finde das lange i",
                options: ["Kino", "Kind", "bitte"],
                answer: "Kino",
                reveal: "Ki<span class='syllable'>..</span>no",
                hint: "Nicht jedes lange i wird mit ie geschrieben."
            },
            {
                chapter: 6,
                cue: "..",
                theme: "syllable-theme",
                mode: "Kapitel 6: Silben",
                instruction: "Setze die Silbenpunkte.",
                word: "Medizin",
                options: ["Me..di..zin", "Med..i..zin", "Me..diz..in"],
                answer: "Me..di..zin",
                reveal: "Me<span class='syllable'>..</span>di<span class='syllable'>..</span>zin",
                hint: "Die Punkte zeigen kleine Leseschritte."
            },
            {
                chapter: 6,
                cue: "!!",
                theme: "detective-theme",
                mode: "Kapitel 6: Vergleich",
                instruction: "Finde das richtige Wort.",
                word: "Kaffe oder Kaffee?",
                options: ["Kaffee", "Kaffe", "Kafe"],
                answer: "Kaffee",
                reveal: "der Kaffee",
                hint: "Kaffee reimt sich mit See, Fee und Klee."
            },
            {
                chapter: 6,
                cue: "aa",
                theme: "vowel-theme",
                mode: "Kapitel 6: Doppelvokal",
                instruction: "Welcher Vokal passt?",
                word: "der <span class='syllable'>..</span>l",
                options: ["aa", "ee", "oo"],
                answer: "aa",
                reveal: "der Aal",
                hint: "Aal hat den Vokal-Zwilling aa."
            },
            {
                chapter: 6,
                cue: "=",
                theme: "rhyme-theme",
                mode: "Kapitel 6: Reim",
                instruction: "Welches Wort reimt sich?",
                word: "See",
                options: ["Klee", "Paar", "Boot"],
                answer: "Klee",
                reveal: "See - Klee",
                hint: "Reime machen Wortfamilien h&ouml;rbar."
            },
            {
                chapter: 6,
                cue: "i",
                theme: "longi-theme",
                mode: "Kapitel 6: langes i",
                instruction: "Was passt zur i-Gruppe?",
                word: "prima - Medizin - ?",
                options: ["Maschine", "Mitte", "still"],
                answer: "Maschine",
                reveal: "Ma<span class='syllable'>..</span>schi<span class='syllable'>..</span>ne",
                hint: "Maschine geh&ouml;rt zu den W&ouml;rtern mit langem i."
            },
            {
                chapter: 6,
                cue: "..",
                theme: "syllable-theme",
                mode: "Kapitel 6: Silben",
                instruction: "Setze die Silbenpunkte.",
                word: "Kabine",
                options: ["Ka..bi..ne", "Kab..i..ne", "Ka..bin..e"],
                answer: "Ka..bi..ne",
                reveal: "Ka<span class='syllable'>..</span>bi<span class='syllable'>..</span>ne",
                hint: "Silben machen lange W&ouml;rter leichter lesbar."
            }
        ];

        function getEl(id) {
            return document.getElementById(id);
        }

        function shuffleArray(source) {
            var arr = source.slice(0);
            var i;
            var j;
            var temp;
            for (i = arr.length - 1; i > 0; i--) {
                j = Math.floor(Math.random() * (i + 1));
                temp = arr[i];
                arr[i] = arr[j];
                arr[j] = temp;
            }
            return arr;
        }

        function setText(id, text) {
            getEl(id).innerHTML = text;
        }

        function startGame() {
            score = 0;
            roundIndex = 0;
            errorsK5 = 0;
            errorsK6 = 0;
            locked = false;
            activeTasks = shuffleArray(chapter5Tasks).slice(0, 10).concat(shuffleArray(chapter6Tasks).slice(0, 10));
            activeTasks = shuffleArray(activeTasks);
            setText("score-val", score);
            setText("rounds-val", maxRounds);
            getEl("next-btn").innerHTML = "Weiter";
            getEl("next-btn").onclick = nextRound;
            getEl("next-btn").className = "wide-btn hidden";
            showTask();
        }

        function showTask() {
            var progress;
            var optionsBox;
            var choices;
            var i;
            var btn;
            if (roundIndex >= activeTasks.length) {
                showFinish();
                return;
            }
            locked = false;
            currentTask = activeTasks[roundIndex];
            progress = Math.round((roundIndex / maxRounds) * 100);
            getEl("progress-fill").style.width = progress + "%";
            getEl("mode-card").className = "mode-card " + currentTask.theme;
            setText("mode-symbol", currentTask.cue);
            setText("mode-label", currentTask.mode);
            setText("instruction-text", currentTask.instruction);
            setText("word-box", currentTask.word);
            setText("hint-box", "Pr&uuml;fung " + (roundIndex + 1) + " von " + maxRounds);
            setText("feedback-box", "");
            getEl("feedback-box").className = "feedback";
            getEl("next-btn").className = "wide-btn hidden";
            optionsBox = getEl("options-box");
            optionsBox.innerHTML = "";
            choices = shuffleArray(currentTask.options);
            for (i = 0; i < choices.length; i++) {
                btn = document.createElement("button");
                btn.type = "button";
                btn.className = "option-btn";
                btn.innerHTML = choices[i];
                btn.onclick = makeAnswerHandler(choices[i]);
                optionsBox.appendChild(btn);
            }
        }

        function makeAnswerHandler(choice) {
            return function() {
                checkAnswer(choice);
            };
        }

        function checkAnswer(choice) {
            var feedbackBox;
            if (locked) {
                return;
            }
            locked = true;
            feedbackBox = getEl("feedback-box");
            setText("word-box", currentTask.reveal);
            if (choice === currentTask.answer) {
                score++;
                setText("score-val", score);
                feedbackBox.className = "feedback good";
                feedbackBox.innerHTML = "Treffer. " + currentTask.hint;
            } else {
                if (currentTask.chapter === 5) {
                    errorsK5++;
                } else {
                    errorsK6++;
                }
                feedbackBox.className = "feedback bad";
                feedbackBox.innerHTML = "Richtig ist: <strong>" + currentTask.answer + "</strong><br>" + currentTask.hint;
            }
            getEl("next-btn").className = "wide-btn";
        }

        function nextRound() {
            roundIndex++;
            showTask();
        }

        function getGrade(percent) {
            if (percent >= 96) {
                return { grade: "1", label: "sehr gut" };
            }
            if (percent >= 80) {
                return { grade: "2", label: "gut" };
            }
            if (percent >= 60) {
                return { grade: "3", label: "befriedigend" };
            }
            if (percent >= 45) {
                return { grade: "4", label: "ausreichend" };
            }
            if (percent >= 16) {
                return { grade: "5", label: "mangelhaft" };
            }
            return { grade: "6", label: "ungen&uuml;gend" };
        }

        function saveResults() {
            if (window.localStorage) {
                window.localStorage.setItem("lola_test3_kap5_errors", String(errorsK5));
                window.localStorage.setItem("lola_test3_kap6_errors", String(errorsK6));
                if (errorsK5 > 0) {
                    window.localStorage.setItem("lola_kap5_errors", String(errorsK5));
                }
                if (errorsK6 > 0) {
                    window.localStorage.setItem("lola_kap6_errors", String(errorsK6));
                }
            }
        }

        function showFinish() {
            var optionsBox;
            var message;
            var percent;
            var gradeInfo;
            saveResults();
            getEl("progress-fill").style.width = "100%";
            optionsBox = getEl("options-box");
            optionsBox.innerHTML = "";
            getEl("mode-card").className = "mode-card";
            setText("mode-symbol", "Z");
            setText("mode-label", "Zeugnis");
            setText("instruction-text", "Meilenstein 3 beendet");
            percent = Math.round((score / maxRounds) * 100);
            gradeInfo = getGrade(percent);
            setText("word-box", score + " von " + maxRounds);
            message = "Trefferquote: " + percent + "%<br><span class='grade-badge'>Note " + gradeInfo.grade + "</span><br>" + gradeInfo.label;
            if (errorsK5 === 0 && errorsK6 === 0) {
                message += "<br>Meisterhaft. Kapitel 5 und 6 sitzen.";
            } else {
                message += "<br>Trainiere nur das, was noch wackelt.";
            }
            setText("hint-box", message);
            getEl("feedback-box").className = "feedback";
            setText("feedback-box", "Kapitel 5 Fehler: " + errorsK5 + " | Kapitel 6 Fehler: " + errorsK6);
            if (errorsK5 > 0) {
                addReviewButton("Kapitel 5 wiederholen", "kapitel-5.html");
            }
            if (errorsK6 > 0) {
                addReviewButton("Kapitel 6 wiederholen", "kapitel-6.html");
            }
            addReviewButton("Noch einmal testen", "test-meilenstein-3.html");
            getEl("next-btn").className = "wide-btn";
            getEl("next-btn").innerHTML = "Zum Turnierbaum";
            getEl("next-btn").onclick = function() {
                window.location.href = "index.html";
            };
        }

        function addReviewButton(label, target) {
            var btn = document.createElement("button");
            btn.type = "button";
            btn.className = "wide-btn review-btn";
            btn.innerHTML = label;
            btn.onclick = function() {
                window.location.href = target;
            };
            getEl("options-box").appendChild(btn);
        }

        function goBack() {
            window.location.href = "index.html";
        }

        window.onload = function() {
            getEl("back-btn").onclick = goBack;
            getEl("next-btn").onclick = nextRound;
            startGame();
        };
    </script>
</body>
</html>
