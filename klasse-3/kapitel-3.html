<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Station 3 - Besondere Laute</title>
    <link rel="apple-touch-icon" href="../apple-touch-icon.png">
    <style>
        * { box-sizing: border-box; font-family: 'Verdana', 'Arial', sans-serif; }
        body { background-color: #0d1b2a; color: #ffffff; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; font-size: 19px; line-height: 1.7; letter-spacing: 0.07em; }
        header { text-align: center; margin-bottom: 15px; width: 100%; max-width: 500px; }
        h1 { font-size: 22px; color: #00f5d4; margin: 5px 0; text-transform: uppercase; text-shadow: 0 0 10px rgba(0, 245, 212, 0.4); }
        .timer-container { background-color: #1b263b; border: 2px solid #00f5d4; padding: 8px 15px; border-radius: 20px; display: inline-block; margin: 8px 0; font-size: 20px; font-weight: bold; color: #00f5d4; }
        .progress-bar { width: 100%; background-color: #415a77; height: 15px; border-radius: 10px; overflow: hidden; margin-top: 10px; }
        .progress { height: 100%; background-color: #00f5d4; width: 0%; transition: width 0.3s ease; }
        .game-container { background: #1b263b; border-radius: 15px; padding: 20px; width: 100%; max-width: 500px; box-shadow: 0 0 15px rgba(0, 245, 212, 0.4); min-height: 460px; display: flex; flex-direction: column; justify-content: space-between; border: 2px solid #00f5d4; }
        .screen { display: none; flex-direction: column; height: 100%; }
        .screen.active { display: flex; }
        .instruction { font-weight: bold; margin-bottom: 12px; color: #ffffff; font-size: 19px; }
        button { background-color: #00f5d4; color: #0d1b2a; border: none; padding: 15px 20px; font-size: 19px; font-weight: bold; border-radius: 25px; cursor: pointer; margin-top: 15px; width: 100%; box-shadow: 0 4px 10px rgba(0, 245, 212, 0.2); }
        .word-display { font-size: 32px; font-weight: bold; text-align: center; margin: 15px 0; background: #0d1b2a; padding: 12px; border-radius: 8px; color: #00f5d4; border: 2px solid #00f5d4; }
        .options-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .options-grid button { margin: 0; background-color: #415a77; color: #ffffff; font-size: 22px; border: 1px solid rgba(255,255,255,0.2); padding: 15px; border-radius: 10px; text-align: center; }
        .options-grid button:active, .options-grid button.selected { background-color: #00f5d4; color: #0d1b2a; }
        .feedback { text-align: center; font-weight: bold; font-size: 18px; margin-top: 10px; min-height: 25px; }
        .correct { color: #00f5d4; text-shadow: 0 0 8px #00f5d4; }
        .wrong { color: #ff5400; }
    </style>
</head>
<body>
    <header>
        <h1>🏆 Wortmeister: Station 3 ⚽</h1>
        <div id="station-title" style="font-weight: bold; color: #00f5d4;">Bereite Arena vor...</div>
        <div class="timer-container">⏱️ Spielzeit: <span id="game-timer">00:00</span></div>
        <div class="progress-bar"><div class="progress" id="app-progress"></div></div>
    </header>

    <div class="game-container">
        <div id="spiel-screen" class="screen active">
            <div class="instruction">Welcher x-Laut wird gesucht? ⚡</div>
            <div class="word-display" id="s3-word">..</div>
            <div class="options-grid" id="s3-options">
                <button id="opt1" onclick="selectOption(1)">x</button>
                <button id="opt2" onclick="selectOption(2)">chs</button>
            </div>
            <div class="feedback" id="s3-feedback"></div>
            <button style="display:none;" id="s3-next-btn" onclick="nextQuestion()">Nächstes Wort 🏃‍♂️</button>
        </div>

        <div id="finish-screen" class="screen">
            <div class="instruction" style="text-align: center; font-size: 24px; color: #00f5d4;">🎉 KAPITEL 3 MEISTER! 🎉</div>
            <div class="word-display" style="font-size: 18px; line-height: 1.6; text-align: left;">
                ⏱️ Spielzeit: <span id="rep-time" style="color:#00f5d4; font-weight:bold;">00:00</span><br>
                🎯 Trefferquote: <span id="rep-quota" style="color:#00f5d4; font-weight:bold;">100%</span><br><br>
                <b>📋 Hexen-Merksätze (Mira):</b><br>
                • Tiere wie <i>Dachs, Fuchs, Lachs</i> haben <b>chs</b>.<br>
                • Wörter wie <i>Hexe, Experiment, Expertin</i> haben ein klares <b>x</b>!
            </div>
            <button onclick="window.location.href='index.html'">Zurück zum Hauptmenü 🏠</button>
        </div>
    </div>

    <script>
        var totalSeconds = 0; var timerInterval = null;
        var totalGoalsToMake = 5; var totalAttemptsMade = 0;
        var pool = [
            { w: "die He_ _e", c: 1, text: "Hexe schreibt man mit x!" },
            { w: "der Da_ _s", c: 2, text: "Dachs schreibt man mit chs!" },
            { w: "das E_ _periment", c: 1, text: "Experiment schreibt man mit x!" },
            { w: "der Fu_ _s", c: 2, text: "Fuchs schreibt man mit chs!" },
            { w: "die Eide_ _e", c: 1, text: "Eidechse schreibt man mit x!" }
        ];
        var questions = []; var currentIndex = 0;

        function startTimer() {
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(function() {
                totalSeconds++;
                var mins = Math.floor(totalSeconds / 60); var secs = totalSeconds % 60;
                document.getElementById("game-timer").innerText = (mins < 10 ? "0" + mins : mins) + ":" + (secs < 10 ? "0" + secs : secs);
            }, 1000);
        }

        function shuffleArray(arr) {
            var temp = arr.slice();
            for (var i = temp.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var b = temp[i]; temp[i] = temp[j]; temp[j] = b;
            }
            return temp;
        }

        function initGame() {
            questions = shuffleArray(pool).slice(0, totalGoalsToMake);
            currentIndex = 0; totalAttemptsMade = 0; totalSeconds = 0;
            startTimer(); showQuestion();
        }

        function showQuestion() {
            document.getElementById("station-title").innerText = "Kapitel 3 - Runde " + (currentIndex + 1) + "/" + totalGoalsToMake;
            document.getElementById("app-progress").style.width = ((currentIndex / totalGoalsToMake) * 100) + "%";
            document.getElementById("s3-feedback").innerText = "";
            document.getElementById("s3-next-btn").style.display = "none";
            var cur = questions[currentIndex];
            document.getElementById("s3-word").innerText = cur.w;
        }

        function selectOption(num) {
            totalAttemptsMade++;
            var fb = document.getElementById("s3-feedback");
            var cur = questions[currentIndex];
            if(num === cur.c) {
                fb.className = "feedback correct"; fb.innerText = "⚽ REINFLECK! " + cur.text;
                document.getElementById("s3-next-btn").style.display = "block";
            } else {
                fb.className = "feedback wrong"; fb.innerText = "Gehalten! Überlege noch einmal.";
            }
        }

        function nextQuestion() {
            currentIndex++;
            if(currentIndex >= totalGoalsToMake) {
                clearInterval(timerInterval);
                document.getElementById("spiel-screen").style.display = "none";
                document.getElementById("finish-screen").style.display = "flex";
                document.getElementById("rep-time").innerText = document.getElementById("game-timer").innerText;
                var quota = Math.round((totalGoalsToMake / totalAttemptsMade) * 100);
                document.getElementById("rep-quota").innerText = quota + "%";
            } else {
                showQuestion();
            }
        }
        window.onload = initGame;
    </script>
</body>
</html>
