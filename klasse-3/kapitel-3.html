<!DOCTYPE html>
<html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><title>Wortmeister - Kapitel 3</title><link rel="apple-touch-icon" href="../apple-touch-icon.png"><style>*{box-sizing:border-box}html,body{min-height:100%}body{margin:0;background:#081827;color:#fff;font-family:Arial,Verdana,sans-serif;letter-spacing:.06em;user-select:none;-webkit-user-select:none}.arena{min-height:100vh;display:flex;flex-direction:column;padding:12px;background:radial-gradient(circle at 50% 0%,rgba(0,242,254,.16),rgba(8,24,39,0) 34%),linear-gradient(180deg,#102b45 0%,#081827 62%)}.topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;max-width:520px;width:100%;margin:0 auto 10px}.nav-back{min-width:76px;min-height:42px;border:1px solid #89b8d9;background:rgba(8,24,39,.7);color:#d8f6ff;border-radius:8px;font-size:14px;font-weight:bold}.title{flex:1;min-width:0;text-align:center;color:#00f2fe;font-size:18px;font-weight:bold;text-transform:uppercase}.score{min-width:76px;text-align:right;font-weight:bold;font-size:15px}.progress-track{max-width:520px;width:100%;height:12px;border-radius:999px;overflow:hidden;margin:0 auto 12px;background:#34526d;border:1px solid rgba(255,255,255,.16)}.progress-fill{height:100%;width:0%;background:linear-gradient(90deg,#00f2fe,#d7ff4f)}.card{max-width:520px;width:100%;margin:0 auto;border:2px solid #00f2fe;background:rgba(13,37,59,.94);border-radius:8px;padding:14px;min-height:430px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:0 0 18px rgba(0,242,254,.25)}.mode-card{display:flex;align-items:center;gap:12px;border-radius:8px;padding:10px;background:#102f49;border:2px solid #d7ff4f;min-height:74px}.mode-symbol{width:76px;min-width:76px;height:52px;display:flex;align-items:center;justify-content:center;border-radius:8px;background:#d7ff4f;color:#081827;font-size:25px;font-weight:bold;letter-spacing:0;text-align:center}.mode{min-width:0;color:#fff;font-weight:bold;font-size:20px;line-height:1.15;letter-spacing:.03em}.instruction{margin-top:12px;color:#fff;font-size:22px;line-height:1.25;min-height:58px;font-weight:bold}.word-box{margin:12px 0;min-height:102px;border:2px dashed #00f2fe;border-radius:8px;background:#081827;color:#fff;display:flex;align-items:center;justify-content:center;text-align:center;padding:14px;font-size:34px;font-weight:bold;line-height:1.22;overflow-wrap:anywhere}.hint{color:#d7ff4f;min-height:26px;font-size:16px;line-height:1.35;font-weight:bold;text-align:center}.options{display:flex;flex-direction:column;gap:10px;margin-top:12px}.option-btn,.wide-btn{width:100%;max-width:100%;min-width:0;min-height:62px;border:2px solid #00f2fe;border-radius:8px;background:#1d4466;color:#fff;font-size:22px;font-weight:bold;letter-spacing:.04em;padding:12px;overflow-wrap:anywhere;-webkit-tap-highlight-color:transparent}.option-btn:active,.wide-btn:active{transform:scale(.98);background:#00f2fe;color:#081827}.feedback{min-height:62px;margin-top:12px;padding:10px;border-radius:8px;font-size:16px;line-height:1.35;text-align:center;font-weight:bold;background:rgba(8,24,39,.7)}.good{color:#9cff7c;border:1px solid rgba(156,255,124,.5)}.bad{color:#ffb1b1;border:1px solid rgba(255,177,177,.5)}.hidden{display:none}.grade-badge{display:inline-flex;align-items:center;justify-content:center;min-width:86px;min-height:62px;margin-top:8px;border-radius:8px;background:#d7ff4f;color:#081827;font-size:34px;font-weight:bold;letter-spacing:0}.review-btn{margin-top:10px;border-color:#d7ff4f;background:#244b31}.a-theme{border-color:#00f2fe}.a-theme .mode-symbol{background:#00f2fe}.b-theme{border-color:#d7ff4f}.b-theme .mode-symbol{background:#d7ff4f}.c-theme{border-color:#ffcc66}.c-theme .mode-symbol{background:#ffcc66}.d-theme{border-color:#ff8fb1}.d-theme .mode-symbol{background:#ff8fb1}@media(max-width:380px){.word-box{font-size:29px}.option-btn,.wide-btn{font-size:19px;min-height:58px}.title{font-size:16px}.mode{font-size:18px}.instruction{font-size:20px}.mode-symbol{width:66px;min-width:66px;font-size:22px}}</style></head><body><div class="arena"><div class="topbar"><button class="nav-back" id="back-btn" type="button">Men&uuml;</button><div class="title">Kapitel 3: Besondere Laute</div><div class="score"><span id="score-val">0</span> / <span id="rounds-val">10</span></div></div><div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div><div class="card"><div><div class="mode-card" id="mode-card"><div class="mode-symbol" id="mode-symbol">?</div><div class="mode" id="mode-label">Training wird geladen</div></div><div class="instruction" id="instruction-text">Gleich geht es los.</div><div class="word-box" id="word-box">...</div><div class="hint" id="hint-box"></div></div><div><div class="options" id="options-box"></div><div class="feedback" id="feedback-box"></div><button class="wide-btn hidden" id="next-btn" type="button">Weiter</button></div></div></div><script>
var maxRounds=10;var score=0;var roundIndex=0;var activeTasks=[];var currentTask=null;var locked=false;var chapterErrors=0;var errorsA=0;var errorsB=0;var tasks=[{"cue": "x", "theme": "a-theme", "mode": "x oder chs", "instruction": "Welcher Laut passt?", "word": "die He..e", "options": ["x", "chs", "ks"], "answer": "x", "reveal": "die Hexe", "hint": "Hexe schreibt man mit x."}, {"cue": "chs", "theme": "b-theme", "mode": "x oder chs", "instruction": "Welcher Laut passt?", "word": "der Da..s", "options": ["chs", "x", "ks"], "answer": "chs", "reveal": "der Dachs", "hint": "Dachs schreibt man mit chs."}, {"cue": "x", "theme": "a-theme", "mode": "x oder chs", "instruction": "Welcher Laut passt?", "word": "das E..periment", "options": ["x", "chs", "ks"], "answer": "x", "reveal": "das Experiment", "hint": "Experiment schreibt man mit x."}, {"cue": "chs", "theme": "b-theme", "mode": "x oder chs", "instruction": "Welcher Laut passt?", "word": "der Fu..s", "options": ["chs", "x", "ks"], "answer": "chs", "reveal": "der Fuchs", "hint": "Fuchs schreibt man mit chs."}, {"cue": "chs", "theme": "b-theme", "mode": "x oder chs", "instruction": "Welcher Laut passt?", "word": "der La..", "options": ["chs", "x", "ks"], "answer": "chs", "reveal": "der Lachs", "hint": "Tiere wie Lachs haben oft chs."}, {"cue": "x", "theme": "a-theme", "mode": "x-Wort", "instruction": "Welche Version ist richtig?", "word": "Expertin", "options": ["Expertin", "Echpertin", "Eksp&auml;rtin"], "answer": "Expertin", "reveal": "Expertin", "hint": "Expertin ist ein x-Wort."}, {"cue": "V", "theme": "c-theme", "mode": "v oder f", "instruction": "Welcher Buchstabe passt?", "word": "der ..ogel", "options": ["V", "F", "W"], "answer": "V", "reveal": "der Vogel", "hint": "Vogel schreibt man mit V."}, {"cue": "V", "theme": "c-theme", "mode": "v oder f", "instruction": "Welcher Buchstabe passt?", "word": "die ..ase", "options": ["V", "F", "W"], "answer": "V", "reveal": "die Vase", "hint": "Vase schreibt man mit V."}, {"cue": "F", "theme": "d-theme", "mode": "v oder f", "instruction": "Welcher Buchstabe passt?", "word": "der ..uchs", "options": ["F", "V", "W"], "answer": "F", "reveal": "der Fuchs", "hint": "Fuchs schreibt man mit F und chs."}, {"cue": "x", "theme": "a-theme", "mode": "x-Wort", "instruction": "Welche Version ist richtig?", "word": "Hexe", "options": ["Hexe", "Hechse", "Hekse"], "answer": "Hexe", "reveal": "Hexe", "hint": "Hexe schreibt man mit x."}, {"cue": "chs", "theme": "b-theme", "mode": "x oder chs", "instruction": "Welcher Laut passt?", "word": "se..", "options": ["chs", "x", "ks"], "answer": "chs", "reveal": "sechs", "hint": "sechs schreibt man mit chs."}, {"cue": "x", "theme": "a-theme", "mode": "x-Wort", "instruction": "Welche Version ist richtig?", "word": "Text", "options": ["Text", "Techst", "Tekst"], "answer": "Text", "reveal": "Text", "hint": "Text schreibt man mit x."}];
function getEl(id){return document.getElementById(id)}function shuffleArray(source){var arr=source.slice(0);var i;var j;var temp;for(i=arr.length-1;i>0;i--){j=Math.floor(Math.random()*(i+1));temp=arr[i];arr[i]=arr[j];arr[j]=temp}return arr}function setText(id,text){getEl(id).innerHTML=text}
function startGame(){score=0;roundIndex=0;chapterErrors=0;errorsA=0;errorsB=0;locked=false;activeTasks=shuffleArray(tasks).slice(0,maxRounds);setText('score-val',score);setText('rounds-val',maxRounds);getEl('next-btn').innerHTML='Weiter';getEl('next-btn').onclick=nextRound;getEl('next-btn').className='wide-btn hidden';showTask()}
function showTask(){var progress;var optionsBox;var choices;var i;var btn;if(roundIndex>=activeTasks.length){showFinish();return}locked=false;currentTask=activeTasks[roundIndex];progress=Math.round((roundIndex/maxRounds)*100);getEl('progress-fill').style.width=progress+'%';getEl('mode-card').className='mode-card '+currentTask.theme;setText('mode-symbol',currentTask.cue);setText('mode-label',currentTask.mode);setText('instruction-text',currentTask.instruction);setText('word-box',currentTask.word);setText('hint-box','Runde '+(roundIndex+1)+' von '+maxRounds);setText('feedback-box','');getEl('feedback-box').className='feedback';getEl('next-btn').className='wide-btn hidden';optionsBox=getEl('options-box');optionsBox.innerHTML='';choices=shuffleArray(currentTask.options);for(i=0;i<choices.length;i++){btn=document.createElement('button');btn.type='button';btn.className='option-btn';btn.innerHTML=choices[i];btn.onclick=makeAnswerHandler(choices[i]);optionsBox.appendChild(btn)}}
function makeAnswerHandler(choice){return function(){checkAnswer(choice)}}function checkAnswer(choice){var feedbackBox;if(locked){return}locked=true;feedbackBox=getEl('feedback-box');setText('word-box',currentTask.reveal);if(choice===currentTask.answer){score++;setText('score-val',score);feedbackBox.className='feedback good';feedbackBox.innerHTML='Treffer. '+currentTask.hint}else{chapterErrors++;saveError();feedbackBox.className='feedback bad';feedbackBox.innerHTML='Richtig ist: <strong>'+currentTask.answer+'</strong><br>'+currentTask.hint}getEl('next-btn').className='wide-btn'}
function nextRound(){roundIndex++;showTask()}function saveError(){if(window.localStorage){window.localStorage.setItem('lola_kap3_errors',String(chapterErrors))}}function getGrade(percent){if(percent>=96){return{grade:'1',label:'sehr gut'}}if(percent>=80){return{grade:'2',label:'gut'}}if(percent>=60){return{grade:'3',label:'befriedigend'}}if(percent>=45){return{grade:'4',label:'ausreichend'}}if(percent>=16){return{grade:'5',label:'mangelhaft'}}return{grade:'6',label:'ungen&uuml;gend'}}function saveResults(){if(window.localStorage){window.localStorage.setItem('_kap_errors',String(errorsA));window.localStorage.setItem('_kap_errors',String(errorsB));if(errorsA>0){window.localStorage.setItem('lola_kap_errors',String(errorsA))}if(errorsB>0){window.localStorage.setItem('lola_kap_errors',String(errorsB))}}}
function showFinish(){var message;var percent;var gradeInfo;getEl('progress-fill').style.width='100%';getEl('options-box').innerHTML='';setText('mode-symbol','Z');setText('mode-label','Training geschafft');setText('instruction-text','Kapitel 3 ist bereit f&uuml;r die n&auml;chste Wiederholung.');setText('word-box',score+' von '+maxRounds);message=score>=8?'Starkes Spiel. Besondere Laute sitzen schon gut.':'Gutes Training. Vergleiche x, chs, v und f langsam.';setText('hint-box',message);getEl('feedback-box').className='feedback';setText('feedback-box','Fehler werden f&uuml;r den Meilenstein kapitelweise gemerkt.');getEl('next-btn').className='wide-btn';getEl('next-btn').innerHTML='Noch einmal spielen';getEl('next-btn').onclick=startGame}
function addReviewButton(label,target){var btn=document.createElement('button');btn.type='button';btn.className='wide-btn review-btn';btn.innerHTML=label;btn.onclick=function(){window.location.href=target};getEl('options-box').appendChild(btn)}function goBack(){window.location.href='index.html'}window.onload=function(){getEl('back-btn').onclick=goBack;getEl('next-btn').onclick=nextRound;startGame()};
