<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DFB-Wortmeister 2026 - Kapitel 5</title>
    <style>
        /* DFB Arena & Dyslexie-optimiertes Design */
        body {
            margin: 0;
            padding: 0;
            background-color: #0B192C; /* Dunkelblauer Arena-Hintergrund */
            font-family: 'Arial', sans-serif;
            letter-spacing: 0.07em; /* Dyslexie-Support: Mehr Zeichenabstand */
            color: #FFFFFF;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Stadion-Anzeigetafel */
        .scoreboard {
            background-color: #1E3E62;
            border-bottom: 4px solid #00F2FE; /* Metallic-Türkis Accent */
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .score-display {
            color: #00F2FE;
            font-size: 1.5rem;
        }

        /* Spielfeld / Haupt-Anzeige */
        .pitch {
            height: 40vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .instruction {
            font-size: 1.1rem;
            color: #A0BFE0;
            margin-bottom: 15px;
            min-height: 2.5rem;
        }

        .word-display {
            font-size: 2.5rem;
            font-weight: bold;
            background: rgba(30, 62, 98, 0.6);
            padding: 15px 30px;
            border-radius: 12px;
            border: 2px dashed #00F2FE;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* Visuelle Trennungshilfe für Silbenkerne */
        .syllable-dot {
            color: #00F2FE;
            padding: 0 2px;
        }

        /* Interaktions-Zone (Optimiert für Daumen-Radius iPhone XR) */
        .controls-zone {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 45vh;
            background: linear-gradient(to top, #0B192C 85%, transparent);
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        .btn-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-row {
            display: flex;
            gap: 12px;
            width: 100%;
        }

        /* Trikot- und Arena-Buttons */
        .action-btn {
            background: #1E3E62;
            border: 2px solid #00F2FE;
            color: #FFFFFF;
            border-radius: 12px;
            padding: 18px 10px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            flex: 1;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.1s ease;
        }

        .action-btn:active {
            transform: scale(0.95);
            background: #00F2FE;
            color: #0B192C;
        }

        /* Feedback-Overlay */
        .feedback-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(11, 25, 44, 0.9);
            z-index: 10;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .feedback-text {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .feedback-correct { color: #00FF66; }
        .feedback-wrong { color: #FF3366; }

        /* Zurück zum Turnierbaum */
        .nav-back {
            position: absolute;
            top: 15px;
            left: 15px;
            background: none;
            border: 1px solid #A0BFE0;
            color: #A0BFE0;
            border-radius: 6px;
            padding: 5px 10px;
            font-size: 0.9rem;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <button class="nav-back" onclick="window.location.href='index.html'">🏆 Menü</button>

    <div class="scoreboard">
        Kapitel 5: Der Wörterbuch-Trainer | <span class="score-display">⚽ Tor: <span id="score-val">0</span> / 5</span>
    </div>

    <div class="pitch">
        <div class="instruction" id="game-instruction">Lade Trainingsspiel...</div>
        <div class="word-display" id="game-word">- - -</div>
    </div>

    <div class="controls-zone">
        <div class="btn-container" id="options-box">
            </div>
    </div>

    <div class="feedback-overlay" id="feedback-screen">
        <div class="feedback-text" id="feedback-msg">TOR!</div>
    </div>

    <script>
        // --- REINER ES5 STANDARD ---
        // Wortschatz-Datenbank für Kapitel 5 aus den Original-Lola-Vorlagen
        var dataset = {
            // Spieltyp 1: Mehrzahl -> Einzahl (Wörterbuch-Suche)
            singularPlural: [
                { display: "Fahrräder", correct: "das Fahrrad", wrong: "die Fahrrads" },
                { display: "Kämme", correct: "der Kamm", wrong: "die Kämme" },
                { display: "Gärten", correct: "der Garten", wrong: "das Garten" },
                { display: "Tücher", correct: "das Tuch", wrong: "die Tücher" },
                { display: "Tränen", correct: "die Träne", wrong: "der Tränen" }
            ],
            // Spieltyp 2: Verben -> Grundform finden
            verbInfinitive: [
                { display: "er fälschte", correct: "fälschen", wrong: "fälschen" }, // Falschschreibung wird im Typ abgefangen
                { display: "sie fressen", correct: "fressen", wrong: "fresen" },
                { display: "er aß", correct: "essen", wrong: "asen" },
                { display: "sie fielen", correct: "fallen", wrong: "fieln" },
                { display: "wir küssten", correct: "küssen", wrong: "küsten" }
            ],
            // Spieltyp 3: Alphabetischer Nachfolger
            abcOrder: [
                { display: "Berg", correct: "Dorf", wrong: "Anfang" }, // Was kommt danach?
                { display: "Garten", correct: "Hase", wrong: "Feuer" },
                { display: "Licht", correct: "Netz", wrong: "Keks" },
                { display: "Ort", correct: "Punkt", wrong: "Dorf" }
            ],
            // Spieltyp 4: Schiri-Videobeweis (Falschschreibungen entlarven)
            varCheck: [
                { display: "Fäuer", correct: "Feuer", wrong: "Fäuer" },
                { display: "Berk", correct: "Berg", wrong: "Berk" },
                { display: "Schlus", correct: "Schluss", wrong: "Schlus" },
                { display: "Zait", correct: "Zeit", wrong: "Zait" }
            ]
        };

        var currentRound = 0;
        var maxRounds = 5;
        var score = 0;
        var currentAnswer = "";
        
        // Tracking-Variablen für das globale Meilenstein-Zeugnis
        var chapterErrors = 0;

        function shuffleArray(array) {
            for (var i = array.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var temp = array[i];
                array[i] = array[j];
                array[j] = temp;
            }
            return array;
        }

        function initGame() {
            currentRound = 0;
            score = 0;
            document.getElementById("score-val").innerHTML = score;
            nextTask();
        }

        function nextTask() {
            if (currentRound >= maxRounds) {
                showEndScreen();
                return;
            }

            currentRound++;
            
            // Zufälligen Spieltyp wählen (1 bis 4) für maximale didaktische Variation
            var typeSelector = Math.floor(Math.random() * 4) + 1;
            
            var instructionEl = document.getElementById("game-instruction");
            var wordEl = document.getElementById("game-word");
            var optionsBox = document.getElementById("options-box");
            
            optionsBox.innerHTML = ""; // Box leeren

            var item;
            if (typeSelector === 1) {
                // Typ 1: Mehrzahl-Tackling
                var list1 = dataset.singularPlural;
                item = list1[Math.floor(Math.random() * list1.length)];
                
                instructionEl.innerHTML = "Wie suchst du die Mehrzahl im Wörterbuch?";
                wordEl.innerHTML = item.display;
                currentAnswer = item.correct;
                
                createButtons(item.correct, item.wrong);

            } else if (typeSelector === 2) {
                // Typ 2: Verb-Abseitsfalle (Grundform)
                var list2 = dataset.verbInfinitive;
                item = list2[Math.floor(Math.random() * list2.length)];
                
                instructionEl.innerHTML = "Finde die Grundform (Infinitiv) des Verbs:";
                wordEl.innerHTML = item.display;
                currentAnswer = item.correct;
                
                createButtons(item.correct, item.wrong);

            } else if (typeSelector === 3) {
                // Typ 3: ABC-Reihenfolge (Welches Wort folgt im Wörterbuch danach?)
                var list3 = dataset.abcOrder;
                item = list3[Math.floor(Math.random() * list3.length)];
                
                instructionEl.innerHTML = "Welches Wort kommt im Alphabet <span style='color:#00F2FE;'>NACH</span> diesem?";
                wordEl.innerHTML = item.display;
                currentAnswer = item.correct;
                
                createButtons(item.correct, item.wrong);

            } else {
                // Typ 4: Schiri-Videobeweis (Fehler korrigieren)
                var list4 = dataset.varCheck;
                item = list4[Math.floor(Math.random() * list4.length)];
                
                instructionEl.innerHTML = "⚠️ Schiri-Videobeweis! Klicke die richtige Schreibweise:";
                wordEl.innerHTML = item.display;
                currentAnswer = item.correct;
                
                createButtons(item.correct, item.wrong);
            }
        }

        function createButtons(correctText, wrongText) {
            var optionsBox = document.getElementById("options-box");
            var choices = [correctText, wrongText];
            choices = shuffleArray(choices);

            // ES5-konformer Aufbau der Buttons im Daumensektor
            var row = document.createElement("div");
            row.className = "btn-row";

            for (var i = 0; i < choices.length; i++) {
                var btn = document.createElement("button");
                btn.className = "action-btn";
                btn.innerHTML = choices[i];
                // Wichtig: kein let/const, Übergabe des Wertes via Funktions-Scope
                btn.onclick = (function(selected) {
                    return function() {
                        checkAnswer(selected);
                    };
                })(choices[i]);
                row.appendChild(btn);
            }
            optionsBox.appendChild(row);
        }

        function checkAnswer(selected) {
            var feedbackScreen = document.getElementById("feedback-screen");
            var feedbackMsg = document.getElementById("feedback-msg");
            
            if (selected === currentAnswer) {
                score++;
                document.getElementById("score-val").innerHTML = score;
                feedbackMsg.innerHTML = "⚽ TOR!!";
                feedbackScreen.style.backgroundColor = "rgba(11, 25, 44, 0.95)";
                feedbackMsg.className = "feedback-text feedback-correct";
            } else {
                chapterErrors++;
                // In den localStorage schreiben für das Meilenstein-Zeugnis
                if(window.localStorage) {
                    window.localStorage.setItem("lola_kap5_errors", chapterErrors);
                }
                feedbackMsg.innerHTML = "❌ Gehalten!";
                feedbackScreen.style.backgroundColor = "rgba(44, 11, 11, 0.95)";
                feedbackMsg.className = "feedback-text feedback-wrong";
            }

            feedbackScreen.style.display = "flex";

            setTimeout(function() {
                feedbackScreen.style.display = "none";
                nextTask();
            }, 1200);
        }

        function showEndScreen() {
            var pitchEl = document.getElementById("pitch");
            document.getElementById("game-instruction").innerHTML = "Training beendet!";
            document.getElementById("game-word").innerHTML = "Ergebnis: " + score + " / 5 Tore";
            
            var optionsBox = document.getElementById("options-box");
            optionsBox.innerHTML = "";
            
            var replayBtn = document.createElement("button");
            replayBtn.className = "action-btn";
            replayBtn.innerHTML = "🔄 Erneut spielen";
            replayBtn.onclick = function() {
                initGame();
            };
            
            optionsBox.appendChild(replayBtn);
        }

        // Start beim Laden
        window.onload = function() {
            initGame();
        };
    </script>
</body>
</html>
