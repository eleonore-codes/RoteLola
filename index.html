<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WM-Wortmeister 2026: DFB-Auswärts-Edition</title>
    <style>
        :root {
            --bg-color: #0d1b2a;       
            --text-color: #ffffff;     
            --turq-bright: #00f5d4;    
            --card-bg: #1b263b;        
            --correct-color: #00f5d4;  
            --wrong-color: #ff5400;    
        }

        * {
            box-sizing: border-box;
            font-family: 'Verdana', 'Arial', sans-serif; 
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            font-size: 18px;
            line-height: 1.6;
            letter-spacing: 0.06em; 
        }

        header {
            text-align: center;
            margin-bottom: 15px;
            width: 100%;
            max-width: 500px;
        }

        h1 {
            font-size: 22px;
            color: var(--turq-bright);
            margin: 5px 0;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0, 245, 212, 0.4);
        }

        .timer-container {
            background-color: #1b263b;
            border: 2px solid var(--turq-bright);
            padding: 8px 15px;
            border-radius: 20px;
            display: inline-block;
            margin: 8px 0;
            font-size: 20px;
            font-weight: bold;
            color: var(--turq-bright);
            box-shadow: 0 0 10px rgba(0, 245, 212, 0.3);
        }

        .progress-bar {
            width: 100%;
            background-color: #415a77;
            height: 15px;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress {
            height: 100%;
            background-color: var(--turq-bright);
            width: 16%;
            transition: width 0.3s ease;
        }

        .game-container {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 0 15px rgba(0, 245, 212, 0.4); 
            min-height: 440px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 2px solid var(--turq-bright); 
        }

        .screen {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        .screen.active {
            display: flex;
        }

        .instruction {
            font-weight: bold;
            margin-bottom: 12px;
            color: #ffffff;
            font-size: 19px;
        }

        button {
            background-color: var(--turq-bright);
            color: #0d1b2a;
            border: none;
            padding: 15px 20px;
            font-size: 19px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
            box-shadow: 0 4px 10px rgba(0, 245, 212, 0.2);
            transition: background-color 0.2s, transform 0.1s;
        }

        button:active {
            transform: scale(0.98);
            background-color: #00d1b2;
        }

        .sort-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 10px;
        }

        .sort-item {
            background-color: #415a77;
            border: 2px solid var(--turq-bright);
            padding: 12px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            color: #ffffff;
        }

        .sort-nav-btns button {
            padding: 6px 12px;
