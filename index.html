<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DFB-Wortmeister 2026</title>
    
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Verdana', 'Arial', sans-serif; 
        }

        body {
            background-color: #0d1b2a;
            color: #ffffff;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            font-size: 19px; 
            line-height: 1.7;
            letter-spacing: 0.07em; 
        }

        header {
            text-align: center;
            margin-bottom: 15px;
            width: 100%;
            max-width: 500px;
        }

        h1 {
            font-size: 22px;
            color: #00f5d4;
            margin: 5px 0;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0, 245, 212, 0.4);
        }

        .timer-container {
            background-color: #1b263b;
            border: 2px solid #00f5d4;
            padding: 8px 15px;
            border-radius: 20px;
            display: inline-block;
            margin: 8px 0;
            font-size: 20px;
            font-weight: bold;
            color: #00f5d4;
        }

        .progress-bar {
            width: 100%;
            background-color: #415a77;
            height: 15px;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress {
            height: 100%;
            background-color: #00f5d4;
            width: 14%;
            transition: width 0.3s ease;
        }

        .game-container {
            background: #1b263b;
            border-radius: 15px;
            padding: 20px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 0 15px rgba(0, 245, 212, 0.4); 
            min-height: 460px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 2px solid #00f5d4; 
        }

        .screen {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        .screen.active {
            display: flex;
        }

        .instruction {
            font-weight: bold;
            margin-bottom: 12px;
            color: #ffffff;
            font-size: 19px;
        }

        button {
            background-color: #00f5d4;
            color: #0d1b2a;
            border: none;
            padding: 15px 20px;
            font-size: 19px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
            box-shadow: 0 4px 10px rgba(0, 245, 212, 0.2);
        }

        .sort-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 10px;
            min-height: 50px;
        }

        .sort-item {
            background-color: #415a77;
            border: 2px solid #00f5d4;
            padding: 12px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            color: #ffffff;
        }

        .sort-nav-btns button {
            padding: 6px 12px;
            font-size: 16px;
            margin: 0;
            width: auto;
            background-color: #0d1b2a;
            color: #00f5d4;
            border: 1px solid #00f5d4;
            border-radius: 5px;
            box-shadow: none;
        }

        .word-pool {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
            justify-content: center;
        }

        .word-chip {
            background-color: #415a77;
            border: 2px solid rgba(255,255,255,0.4);
            padding: 12px 16px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            color: #ffffff;
        }

        .word-chip.selected {
            background-color: #00f5d4;
            color: #0d1b2a;
            border-color: #00f5d4;
            box-shadow: 0 0 10px #00f5d4;
        }

        .word-display {
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 0.15em;
            text-align: center;
            margin: 15px 0;
            background: #0d1b2a;
            padding: 12px;
            border-radius: 8px;
            color: #00f5d4;
            border: 2px solid #00f5d4;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .options-grid button {
            margin: 0;
            background-color: #415a77;
            color: #ffffff;
