<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rote Lola - Rechtschreib-Arena</title>
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <style>
        * { box-sizing: border-box; font-family: 'Verdana', 'Arial', sans-serif; }
        body { background-color: #0d1b2a; color: #ffffff; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-size: 19px; line-height: 1.7; letter-spacing: 0.07em; }
        header { text-align: center; margin-bottom: 25px; width: 100%; max-width: 500px; }
        h1 { font-size: 26px; color: #00f5d4; margin: 5px 0; text-transform: uppercase; text-shadow: 0 0 15px rgba(0, 245, 212, 0.5); }
        p { color: #8d99ae; font-size: 16px; margin: 5px 0 20px 0; }
        .main-container { background: #1b263b; border-radius: 15px; padding: 30px 20px; width: 100%; max-width: 500px; box-shadow: 0 0 20px rgba(0, 245, 212, 0.3); border: 2px solid #00f5d4; text-align: center; }
        .arena-logo { font-size: 64px; margin-bottom: 15px; animation: pulse 2s infinite ease-in-out; }
        button { background-color: #00f5d4; color: #0d1b2a; border: none; padding: 16px 20px; font-size: 22px; font-weight: bold; border-radius: 30px; cursor: pointer; width: 100%; box-shadow: 0 4px 15px rgba(0, 245, 212, 0.4); display: flex; justify-content: center; align-items: center; gap: 10px; transition: transform 0.1s ease; }
        button:active { transform: scale(0.98); }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <header>
        <h1>🦊 Rote Lola 🏆</h1>
        <p>Willkommen in der Rechtschreib-Arena!</p>
    </header>

    <div class="main-container">
        <div class="arena-logo">⚽</div>
        <button onclick="window.location.href='klasse-3/index.html'">
            <span>Klasse 3 betreten</span> 🏃‍♂️
        </button>
    </div>
</body>
</html>
