<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WM-Wortmeister 2026: DFB-Auswärts-Edition</title>
    <style>
        /* Farben des DFB-Auswärtstrikots (Dunkelblau, Türkis, Weiß) */
        :root {
            --bg-color: #0d1b2a;       
            --text-color: #ffffff;     
            --turq-bright: #00f5d4;    
            --turq-dark: #00bbf9;      
            --card-bg: #1b263b;        
            --correct-color: #00f5d4;  
            --wrong-color: #ff5400;    
        }

        * {
            box-sizing: border-box;
            font-family: 'Verdana', 'Arial', sans-serif; 
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            font-size: 18px;
            line-height: 1.6;
            letter-spacing: 0.06em; 
        }

        header {
            text-align: center;
            margin-bottom: 15px;
            width: 100%;
            max-width: 500px;
        }

        h1 {
            font-size: 22px;
            color: var(--turq-bright);
            margin: 5px 0;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0, 245, 212, 0.4);
        }

        /* TIMER - JETZT ERKENNBAR UND LEUCHTEND */
        .timer-container {
            background-color: #1b263b;
            border: 2px solid var(--turq-bright);
            padding: 8px 15px;
            border-radius: 20px;
            display: inline-block;
            margin: 8px 0;
            font-size: 20px;
            font-weight: bold;
            color: var(--turq-bright);
            box-shadow: 0 0 10px rgba(0, 245, 212, 0.3);
        }

        .progress-bar {
            width: 100%;
            background-color: #415a77;
            height: 15px;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress {
            height: 100%;
            background-color: var(--turq-bright);
            width: 16%;
            transition: width 0.3s ease;
        }

        .game-container {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            min-height: 440px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 1px solid rgba(0, 245, 212, 0.2);
        }

        .screen {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        .screen.active {
            display: flex;
        }

        .instruction {
            font-weight: bold;
            margin-bottom: 12px;
            color: #ffffff;
            font-size: 19px;
        }

        button {
            background-color: var(--turq-dark);
            color: #0d1b2a;
            border: none;
            padding: 15px 20px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
        }

        .sort-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 10px;
        }

        .sort-item {
            background-color: #415a77;
            border: 2px solid var(--turq-dark);
            padding: 12px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            color: #ffffff;
        }

        .sort-nav-btns button {
            padding: 6px 12px;
            font-size: 16px;
            margin: 0;
            width: auto;
            background-color: #0d1b2a;
            color: var(--turq-bright);
            border: 1px solid var(--turq-bright);
        }

        .word-pool {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
            justify-content: center;
        }

        .word-chip {
            background-color: #415a77;
            border: 2px solid rgba(255,255,255,0.4);
            padding: 10px 14px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            color: #ffffff;
        }

        .word-chip.selected {
            background-color: var(--turq-bright);
            color: #0d1b2a;
            border-color: var(--turq-bright);
            box-shadow: 0 0 10px var(--turq-bright);
        }

        .word-display {
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 0.15em;
            text-align: center;
            margin: 15px 0;
            background: #0d1b2a;
            padding: 12px;
            border-radius: 8px;
            color: var(--turq-bright);
            border: 1px solid rgba(0, 245, 212, 0.3);
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .options-grid button {
            margin: 0;
            background-color: #415a77;
            color: #ffffff;
            font-size: 26px;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 15px;
        }

        .feedback {
            text-align: center;
            font-weight: bold;
            font-size: 18px;
            margin-top: 10px;
            min-height: 25px;
        }
        
        .correct { color: var(--correct-color); text-shadow: 0 0 8px var(--correct-color); }
        .wrong { color: var(--wrong-color); }

        .hint {
            font-size: 14px;
            color: #e0e0e0;
            margin-bottom: 10px;
            font-style: italic;
        }

        /* Zeugnis-Style */
        .report-card {
            background: #0d1b2a;
            border: 2px dashed var(--turq-bright);
            border-radius: 10px;
            padding: 15px;
            margin-top: 10px;
            text-align: left;
        }

        .report-line {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
